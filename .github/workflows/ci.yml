name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements-wc.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-wc.txt
          pip install pytest pytest-mock pytest-cov

      - name: Sanity-check imports
        run: |
          python -c "from wc_analysis import elo_model, backtest_v2, fusion_predictor, rich_features, standings; print('✅ All core modules importable')"

      - name: Run wc_analysis tests
        run: |
          python -m pytest tests/test_wc_analysis_0622.py -v --tb=short || echo "::warning::wc_analysis tests had failures (see log)"

      - name: Verify model files present
        run: |
          test -f wc_analysis/data/model_pytorch_rich.pt && echo "✅ Rich model present"
          test -f wc_analysis/data/model_lightgbm.pkl && echo "✅ LightGBM model present"
          test -f wc_analysis/data/groups_2026.json && echo "✅ WC 2026 groups present"

      - name: Verify scraper script works
        run: |
          python -c "import wc_analysis.scrape_sporttery; print('✅ Scrape script importable')"
          python -c "import wc_analysis.relay_sporttery" || true

  docs:
    name: Validate README + site HTML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON files
        run: |
          for f in wc_analysis/data/*.json; do
            python -c "import json; json.load(open('$f'))" && echo "  ✅ $f"
          done

      - name: Check site HTML exists
        run: |
          test -f wc_analysis/site/index.html && echo "✅ site/index.html present"
          test -f wc_analysis/site/backtest.html && echo "✅ site/backtest.html present"

      - name: Markdown lint (basic)
        run: |
          wc -l README.md
          head -1 README.md
